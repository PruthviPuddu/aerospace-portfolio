                                            TRANSMIT <Icon name="send" className="w-3.5 h-3.5" />
                                        </button>
                                    </div>
                                </form>

                                {status && <div className="mt-4 p-3 bg-[#050C1B] border border-cyanAccent/30 text-[11px] font-mono text-cyanAccent">{status}</div>}

                                {/* Local State Buffer Data Monitor Logs */}
                                {dbSubmissions.length > 0 && (
                                    <div className="mt-6 pt-6 border-t border-slate-900 space-y-2">
                                        <div className="text-[9px] font-mono text-slate-600 uppercase tracking-widest">LOCAL STATE DB COMMIT LOGS:</div>
                                        <div className="max-h-40 overflow-y-auto space-y-2 pr-2">
                                            {dbSubmissions.map(sub => (
                                                <div key={sub.id} className="p-2.5 bg-[#030712] border border-slate-900 text-[10px] font-mono text-slate-400">
                                                    <div className="text-cyanAccent">TX_ID: {sub.id} @ {sub.timestamp}</div>
                                                    <div>SENDER: {sub.name} ({sub.email})</div>
                                                    <div className="text-slate-300 italic">" {sub.message} "</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    <footer className="border-t border-slate-900 py-8 text-center text-[10px] font-mono text-slate-600">
                        <p>© 2026 PRUTHVI SHANKAR PULIJALA // AEROSPACE SYSTEMS PORTFOLIO DEPLOYMENT MATRIX</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
